<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymNex | Perfil do Instrutor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css.css">
</head>
<body>

<div class="d-flex wrapper">

    <nav class="sidebar bg-dark text-white p-3 flex-shrink-0 shadow-lg">
        <div class="d-flex align-items-center mb-4 mt-2 px-2">
            <i class="fa-solid fa-dumbbell fs-3 text-primary me-2 pulse-icon"></i>
            <span class="fs-4 fw-bold tracking-wide">Gym<span class="text-primary">Nex</span></span>
        </div>
        <hr class="border-secondary">
        <ul class="nav nav-pills flex-column mb-auto mt-3">
            <li class="nav-item mb-2"><a href="index.html" class="nav-link text-white rounded-3 py-3 opacidade-hover"><i class="fa-solid fa-users me-2"></i> Gerenciar Alunos</a></li>
            <li class="nav-item mb-2"><a href="sinais-vitais.html" class="nav-link text-white rounded-3 py-3 opacidade-hover"><i class="fa-solid fa-heart-pulse me-2"></i> Sinais Vitais</a></li>
            <li class="nav-item mb-2"><a href="planos.html" class="nav-link text-white rounded-3 py-3 opacidade-hover"><i class="fa-solid fa-clipboard-list me-2"></i> Planos e Treinos</a></li>
        </ul>
        <hr class="border-secondary">
        <div class="dropdown">
            <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle px-2" data-bs-toggle="dropdown" aria-expanded="false">
                <img id="sidebar-instrutor-foto" src="https://ui-avatars.com/api/?name=Instrutor&background=0d6efd&color=fff" alt="Perfil" width="32" height="32" class="rounded-circle me-2 border border-primary">
                <strong id="sidebar-instrutor-nome">Instrutor</strong>
            </a>
            <ul class="dropdown-menu dropdown-menu-dark text-small shadow">
                <li><a class="dropdown-item" href="configuracoes.html">Configurações</a></li>
                <li><a class="dropdown-item active" href="perfil.html">Perfil</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger" href="#">Sair do Sistema</a></li>
            </ul>
        </div>
    </nav>

    <main class="content p-4 w-100 bg-body-tertiary fade-in">
        <div class="content-inner">

            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6 mt-4">
                    <div class="card border-0 shadow-lg rounded-4 overflow-hidden mb-5">
                        <div class="card-header bg-primary text-white p-4 border-0 text-center">
                            <h4 class="fw-bold mb-0"><i class="fa-solid fa-id-badge me-2"></i> Perfil do Instrutor</h4>
                        </div>
                        <div class="card-body p-5 bg-body">
                            <form id="form-perfil" novalidate>
                                <div class="text-center mb-4">
                                    <img id="preview-foto" src="" class="rounded-circle border border-3 border-primary mb-3 object-fit-cover" width="120" height="120" alt="Foto">
                                </div>

                                <div class="form-floating mb-3">
                                    <input type="text" class="form-control" id="nome" required>
                                    <label for="nome" class="text-muted">Nome Completo</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input type="email" class="form-control" id="email" required>
                                    <label for="email" class="text-muted">E-mail</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input type="tel" class="form-control" id="telefone" required>
                                    <label for="telefone" class="text-muted">Telemóvel</label>
                                </div>
                                <div class="form-floating mb-4">
                                    <input type="text" class="form-control" id="especialidades" required>
                                    <label for="especialidades" class="text-muted">Especialidades (Ex: Musculação, CrossFit)</label>
                                </div>

                                <div class="mb-5 p-3 border rounded bg-body-tertiary">
                                    <label for="fotoPerfilFile" class="form-label text-muted fw-bold mb-2">
                                        <i class="fa-solid fa-camera me-1"></i> Upload da Nova Foto de Perfil
                                    </label>
                                    <input class="form-control form-control-lg" type="file" id="fotoPerfilFile" accept="image/png, image/jpeg, image/webp">
                                    <div class="form-text text-muted mt-2">Formatos suportados: PNG, JPG ou WEBP.</div>
                                </div>

                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm">
                                        <i class="fa-solid fa-floppy-disk me-2"></i> Salvar Perfil
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>
</div>

<button class="btn btn-dark rounded-circle shadow-lg theme-toggle-fixed border border-secondary" id="btn-theme-toggle" title="Alternar Tema">
    <i class="fa-solid fa-moon"></i>
</button>

<footer class="static-fixed-footer">
    <div>
        <strong>GymNex</strong> System &copy; 2026 - Desenvolvido para <a href="#">Profissionais Modernos</a>.
    </div>
</footer>

<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container" style="z-index: 1080;"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="perfil.js"></script>
</body>
</html>
