<!DOCTYPE html>
<html lang="pt-PT" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymNex | Login do Instrutor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100 bg-body-tertiary">

<div class="card border-0 shadow-lg p-4" style="width: 100%; max-width: 420px; border-radius: 15px;">
    <div class="text-center mb-4 mt-2">
        <i class="fa-solid fa-dumbbell fs-1 text-primary mb-2"></i>
        <h2 class="fw-bold tracking-wide">Gym<span class="text-primary">Nex</span></h2>
        <p class="text-muted small">Painel de Autenticação do Instrutor</p>
    </div>

    <form id="login-form">
        <div class="form-floating mb-3">
            <input type="email" id="email" class="form-control" placeholder="nome@exemplo.com" required>
            <label for="email" class="text-muted"><i class="fa-solid fa-envelope me-1"></i> E-mail</label>
        </div>

        <div class="form-floating mb-4">
            <input type="password" id="senha" class="form-control" placeholder="Senha" required>
            <label for="senha" class="text-muted"><i class="fa-solid fa-lock me-1"></i> Senha</label>
        </div>

        <button type="submit" id="btn-entrar" class="btn btn-primary w-100 btn-lg fw-bold shadow-sm" style="border-radius: 10px;">
            <i class="fa-solid fa-right-to-bracket me-2"></i> Entrar no Sistema
        </button>

        <div id="erro-msg" class="alert alert-danger mt-3 p-2 text-center small" style="display: none; border-radius: 8px;">
            <i class="fa-solid fa-circle-exclamation me-1"></i> E-mail ou senha incorretos!
        </div>
    </form>
</div>

<script type="module" src="login.js"></script>
</body>
</html>
