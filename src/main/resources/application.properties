
spring.application.name=gymnex

# Configuração do Banco de Dados H2 (Em Memória)
spring.datasource.url=jdbc:h2:mem:gymnexdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Permite que o Spring crie e atualize as tabelas automaticamente com base no nosso código Java
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Ativa o Console do H2 no navegador para você conseguir ver as tabelas depois
spring.h2.console.enabled=true


server.port=8081